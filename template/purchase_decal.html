{% extends "base.html" %}

{% block content %}
<h1>Purchase Parking Decal</h1>

<div class="card">
    <h2>Parking Decal Payment</h2>
    <p><strong>Decal Price:</strong> $75.00</p>
    <p>This is a demo payment page. Use fake card information.</p>

    <form method="POST">
        <label>Cardholder Name:</label><br>
        <input type="text" name="card_name" placeholder="Enter name" required><br><br>

        <label>Card Number:</label><br>
        <input type="text" name="card_number" placeholder="4111 1111 1111 1111" required><br><br>

        <label>Expiration Date:</label><br>
        <input type="text" name="exp_date" placeholder="MM/YY" required><br><br>

        <label>CVV:</label><br>
        <input type="text" name="cvv" placeholder="123" required><br><br>

        <button type="submit">Submit Payment</button>
    </form>

    <br>
    <a href="/tickets">Cancel</a>
</div>
{% endblock %}
